<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Urban Care Project Theme Palette (#646e57 Sage Green & #262e1e Forest Dark) -->
    <linearGradient id="projectThemeGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A2014" />
      <stop offset="45%" stop-color="#373F30" />
      <stop offset="85%" stop-color="#646E57" />
      <stop offset="100%" stop-color="#7B876D" />
    </linearGradient>

    <linearGradient id="sageAccentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B876D" />
      <stop offset="100%" stop-color="#5A6054" />
    </linearGradient>

    <linearGradient id="lightSageBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F4F6F2" />
    </linearGradient>

    <filter id="softThemeShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#262E1E" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Container Base Matched to Project Surface Color (#F9FAF8 / White) -->
  <rect width="480" height="480" x="16" y="16" rx="112" fill="url(#lightSageBg)" filter="url(#softThemeShadow)" />
  <rect width="476" height="476" x="18" y="18" rx="110" fill="none" stroke="#DEE4D8" stroke-width="4" />

  <!-- Urban Care Cross Logo Mark in Project Sage Theme -->
  <g transform="translate(256, 256) scale(0.78) translate(-256, -256)">
    <!-- Main Medical Cross Outline -->
    <path d="M 184 64 
             H 328 
             V 184 
             H 448 
             V 328 
             H 328 
             V 448 
             H 184 
             V 328 
             H 64 
             V 184 
             H 184 
             Z" 
          fill="none" 
          stroke="url(#projectThemeGradient)" 
          stroke-width="36" 
          stroke-linejoin="miter" 
          stroke-miterlimit="4" />

    <!-- Urban City Skyline overlay inside Right & Upper Cross -->
    <!-- Building 1 (Left low) -->
    <rect x="200" y="210" width="24" height="96" fill="url(#projectThemeGradient)" rx="2" />
    
    <!-- Building 2 (Mid-Left tall) -->
    <rect x="232" y="140" width="28" height="166" fill="url(#projectThemeGradient)" rx="2" />
    <!-- Building Spire / Antenna -->
    <line x1="246" y1="110" x2="246" y2="140" stroke="url(#projectThemeGradient)" stroke-width="6" stroke-linecap="round" />
    
    <!-- Building 3 (Center-Right skyscraper) -->
    <rect x="268" y="170" width="30" height="136" fill="url(#projectThemeGradient)" rx="2" />
    
    <!-- Building 4 (Right stepped) -->
    <rect x="306" y="225" width="24" height="81" fill="url(#sageAccentGradient)" rx="2" />

    <!-- Building 5 (Far Right wing) -->
    <rect x="338" y="245" width="22" height="61" fill="url(#sageAccentGradient)" rx="2" />

    <!-- Dynamic Diagonal Cut-Through Lines -->
    <path d="M 170 340 L 375 180" stroke="#FFFFFF" stroke-width="26" stroke-linecap="square" />
    <path d="M 170 340 L 375 180" stroke="url(#projectThemeGradient)" stroke-width="12" stroke-linecap="square" />

    <path d="M 190 365 L 395 205" stroke="#FFFFFF" stroke-width="20" stroke-linecap="square" />
    <path d="M 190 365 L 395 205" stroke="url(#sageAccentGradient)" stroke-width="8" stroke-linecap="square" />
  </g>
</svg>